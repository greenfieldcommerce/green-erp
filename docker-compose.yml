services:
  # ---------------------
  # Postgres for both Spring & Keycloak
  # ---------------------
  postgres:
    image: postgres:18
    container_name: greenerp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_GREENERP_DATABASE}
      POSTGRES_USER: ${POSTGRES_GREENERP_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_GREENERP_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - green-erp-net

  # ---------------------
  # Keycloak
  # ---------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.4
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_DATABASE: ${POSTGRES_KEYCLOAK_DATABASE}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USERNAME}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      KC_DB_PORT: 5432
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    ports:
      - "8080:8080"
      - "8000:9000"
    depends_on:
      - postgres
    networks:
      - green-erp-net

  # ---------------------
  # Spring Boot App
  # ---------------------
  greenerp:
    build: .
    container_name: greenerp
    environment:
      POSTGRES_GREENERP_HOST: postgres
      POSTGRES_GREENERP_PORT: 5432
      POSTGRES_GREENERP_DATABASE: ${POSTGRES_GREENERP_DATABASE}
      POSTGRES_GREENERP_USERNAME: ${POSTGRES_GREENERP_USERNAME}
      POSTGRES_GREENERP_PASSWORD: ${POSTGRES_GREENERP_PASSWORD}
      RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/green-erp
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "9000:9000"
    depends_on:
      - keycloak
      - postgres
      - rabbitmq
    networks:
      - green-erp-net

  # ---------------------
  # RabbitMQ
  # ---------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - green-erp-net

networks:
  green-erp-net:

volumes:
  postgres_data:
